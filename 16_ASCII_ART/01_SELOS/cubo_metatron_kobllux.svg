<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" style="background-color: #0b0f14;">
  <defs>
    <style>
      .ponto { fill: #ffd700; stroke: #39ffb6; stroke-width: 2; }
      .linha { stroke: rgba(255,255,255,0.2); stroke-width: 1.5; }
      .opcode { fill: #f5f7ff; font-family: 'Space Mono', monospace; font-size: 12px; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>
  <!-- Linhas do Cubo de Metatron (13 pontos, 78 linhas) – representação estilizada -->
  <g stroke="rgba(255,255,255,0.15)" stroke-width="1">
    <!-- Linhas principais do cubo externo -->
    <line x1="120" y1="120" x2="480" y2="120" />
    <line x1="120" y1="120" x2="120" y2="480" />
    <line x1="480" y1="120" x2="480" y2="480" />
    <line x1="120" y1="480" x2="480" y2="480" />
    <line x1="120" y1="120" x2="480" y2="480" />
    <line x1="480" y1="120" x2="120" y2="480" />
    <!-- Linhas internas (círculos) -->
    <circle cx="300" cy="300" r="180" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <circle cx="300" cy="300" r="254" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
    <circle cx="300" cy="300" r="106" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <!-- Linhas radiais (conexões simbólicas) -->
    <line x1="300" y1="46" x2="300" y2="554" />
    <line x1="46" y1="300" x2="554" y2="300" />
    <line x1="120" y1="120" x2="300" y2="300" />
    <line x1="480" y1="120" x2="300" y2="300" />
    <line x1="120" y1="480" x2="300" y2="300" />
    <line x1="480" y1="480" x2="300" y2="300" />
  </g>

  <!-- Pontos do Cubo de Metatron com identificação -->
  <!-- Ponto 1: Centro (0×00) -->
  <circle cx="300" cy="300" r="8" class="ponto" />
  <text x="300" y="300" class="opcode" fill="#ffd700">0×00</text>

  <!-- Ponto 2: Superior esquerdo (0×01) -->
  <circle cx="120" cy="120" r="6" class="ponto" />
  <text x="120" y="100" class="opcode" fill="#67e6ff">0×01</text>

  <!-- Ponto 3: Superior direito (0×02) -->
  <circle cx="480" cy="120" r="6" class="ponto" />
  <text x="480" y="100" class="opcode" fill="#7cffb2">0×02</text>

  <!-- Ponto 4: Inferior direito (0×03) -->
  <circle cx="480" cy="480" r="6" class="ponto" />
  <text x="480" y="460" class="opcode" fill="#4de0ff">0×03</text>

  <!-- Ponto 5: Inferior esquerdo (0×04) -->
  <circle cx="120" cy="480" r="6" class="ponto" />
  <text x="120" y="460" class="opcode" fill="#ff9ad1">0×04</text>

  <!-- Ponto 6: Meio esquerdo (0×05) -->
  <circle cx="46" cy="300" r="6" class="ponto" />
  <text x="46" y="330" class="opcode" fill="#ff7a00">0×05</text>

  <!-- Ponto 7: Meio superior (0×06) -->
  <circle cx="300" cy="46" r="6" class="ponto" />
  <text x="300" y="25" class="opcode" fill="#7cffb2">0×06</text>

  <!-- Ponto 8: Meio direito (0×07) -->
  <circle cx="554" cy="300" r="6" class="ponto" />
  <text x="554" y="330" class="opcode" fill="#ffd700">0×07</text>

  <!-- Ponto 9: Meio inferior (0×08) -->
  <circle cx="300" cy="554" r="6" class="ponto" />
  <text x="300" y="575" class="opcode" fill="#00b894">0×08</text>

  <!-- Ponto 10: Superior meio (círculo interno) (0×09) -->
  <circle cx="300" cy="210" r="6" class="ponto" />
  <text x="300" cy="210" y="190" class="opcode" fill="#6c5ce7">0×09</text>

  <!-- Ponto 11: Direito meio (círculo interno) (0×0A) -->
  <circle cx="390" cy="300" r="6" class="ponto" />
  <text x="390" y="330" class="opcode" fill="#a8d8f0">0×0A</text>

  <!-- Ponto 12: Inferior meio (círculo interno) (0×0B) -->
  <circle cx="300" cy="390" r="6" class="ponto" />
  <text x="300" y="410" class="opcode" fill="#ff52e5">0×0B</text>

  <!-- Ponto 13: Esquerdo meio (círculo interno) (0×0C) -->
  <circle cx="210" cy="300" r="6" class="ponto" />
  <text x="210" y="330" class="opcode" fill="#f2c94c">0×0C</text>

  <!-- Texto sagrado no rodapé -->
  <text x="300" y="580" fill="#39ffb6" font-family="monospace" font-size="10" text-anchor="middle">VERDADE × INTEGRAR ÷ ∆ = ∞ • 3×6×9×7=1134</text>
</svg>
