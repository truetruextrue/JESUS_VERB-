<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>KOBLLUX SymbolBar v2 · ORB DUAL (1.5s ÁGUA + 3s ARQUÉTIPOS)</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <script defer src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <style>
    /* ═══ ROOT VARS ═══ */
    :root {
      --void: #02020a; --abyss: #060615; --deep: #0a0a20; --ink: #0f0f2e;
      --cu-0: #8B4513; --cu-1: #B87333; --cu-2: #CD853F; --cu-3: #D4943A;
      --cu-4: #E8A855; --cu-5: #F0C060; --cu-6: #C9A84C; --cu-7: #FFD700;
      --kob-voice-primary: #C9A84C; --kob-voice-secondary: #8B4513; --kob-voice-accent: #F0C060;
      --arch-color: #C9A84C; --arch-glow: rgba(201,168,76,0.35); --arch-glow-strong: rgba(201,168,76,0.6);
      --border: color-mix(in srgb, var(--kob-voice-primary) 35%, rgba(255,255,255,0.08));
      --panel-bg: color-mix(in srgb, var(--kob-voice-primary) 8%, #0b0f18);
      --pearl: #e8e0f0; --mist: rgba(232,224,240,0.65); --cyan: #00e5ff;
      --mono: 'Share Tech Mono', monospace; --display: 'Cinzel Decorative', serif;
      --body: 'Rajdhani', sans-serif; --orb-speed: 7.2s;
      --z-bg: 0; --z-content: 100; --z-hud: 5000; --z-overlay: 8000; --z-system: 9999;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: var(--font-family, sans-serif); width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'Montserrat',sans-serif; display: flex; flex-direction: column;
      align-items: center; padding: 20px; background: linear-gradient(to bottom, #000, #1a1a1a);
      color: #d7d7d7; transition: background 1.8s, color 1.8s; animation: fadeIn 1.8s ease forwards;
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.012)} }
    @keyframes orbSpin { to { transform:rotate(360deg); } }
    @keyframes orbPulse { from { transform:scale(1); } to { transform:scale(1.18); } }

    /* ═══ SYMBOL BAR ═══ */
    .symbol-bar {
      position: fixed; left: 16px; top: 50%; transform: translateY(-50%);
      z-index: var(--z-hud); display: flex; flex-direction: column;
      align-items: center; padding: 10px 8px; gap: 0;
      background: rgba(6,6,21,0.88); backdrop-filter: blur(20px) saturate(200%);
      border: 1px solid var(--border);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 8px 40px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06), 0 0 30px var(--arch-glow);
      border-radius: 28px; user-select: none; touch-action: none;
      transition: opacity 0.6s ease, top 0.35s cubic-bezier(0.175,0.885,0.32,1.275), left 0.35s, border-radius 0.25s, border-color 0.5s, box-shadow 0.6s;
    }
    .symbol-bar::before { content:''; position:absolute; top:0; left:16%; right:16%; height:2px; border-radius:0 0 4px 4px;
      background: linear-gradient(90deg, transparent, var(--kob-voice-primary), transparent); opacity:0.7; transition:background 0.5s ease; }

    .symbol-wrap { display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transform: scale(var(--kblx-item-scale,1)); opacity: var(--kblx-item-opacity,1); z-index: var(--kblx-item-z,1);
      transition: transform 0.28s ease, opacity 0.28s ease; position: relative; }

    .symbol-button {
      width: 44px; height: 44px; border-radius: 14px; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.04);
      color: var(--mist); font-size: 16px; cursor: pointer; flex-shrink: 0; position: relative;
      outline: none; font-family: var(--body); transition: all 0.2s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 2px 4px rgba(0,0,0,0.4);
    }
    .symbol-button:hover { background: rgba(255,255,255,0.1); border-color: var(--kob-voice-primary);
      color: var(--kob-voice-primary); box-shadow: 0 0 14px var(--arch-glow), inset 0 1px 0 rgba(255,255,255,0.1); }
    .symbol-button:active { transform: scale(0.86); }
    .symbol-button.main-toggle { background: linear-gradient(160deg, rgba(26,20,10,0.95), rgba(5,5,10,0.98));
      color: var(--kob-voice-primary); border-color: var(--kob-voice-primary); font-size: 22px; font-weight: bold;
      box-shadow: 0 0 16px var(--arch-glow), inset 0 1px 0 rgba(255,255,255,0.1), inset 0 -1px 0 rgba(0,0,0,0.4); }

    .tts-orb-mini { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
    .orb { width: 100%; height: 100%; border-radius: 50%; display: grid; place-items: center; }
    .orb-core {
      width: 80%; height: 80%; border-radius: 50%;
      background: radial-gradient(circle at 28% 28%, var(--kob-voice-accent) 0%, rgba(255,255,255,0.08) 12%, transparent 55%),
                  radial-gradient(circle at 72% 72%, var(--kob-voice-primary) 0%, var(--kob-voice-secondary) 100%);
      box-shadow: 0 0 18px var(--kob-voice-primary), 0 0 8px rgba(255,255,255,0.1) inset;
      animation: orbSpin var(--orb-speed) linear infinite;
      transition: background 0.5s ease, box-shadow 0.5s ease;
    }
    .speaking .orb-core { animation: orbSpin 1.8s linear infinite, orbPulse 0.45s ease-in-out infinite alternate;
      box-shadow: 0 0 30px var(--kob-voice-primary), 0 0 12px rgba(255,255,255,0.15) inset; }

    #btn-arch { width: 48px; height: 48px; border-radius: 50% !important; border: 1.5px solid var(--kob-voice-primary) !important;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.05), rgba(0,0,0,0.6)) !important;
      display: flex; align-items: center; justify-content: center; padding: 0; overflow: visible;
      box-shadow: 0 0 20px var(--arch-glow), 0 0 40px var(--arch-glow), inset 0 1px 0 rgba(255,255,255,0.15) !important;
      cursor: pointer; margin: 2px 0; position: relative; }
    #btn-arch:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--arch-glow-strong), 0 0 60px var(--arch-glow) !important; }

    .hud-info { font-size: 8px; font-family: var(--mono); color: var(--kob-voice-primary);
      text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; padding: 5px 6px;
      margin-top: 4px; border-top: 1px solid var(--border); pointer-events: none;
      opacity: 0.75; white-space: nowrap; transition: color 0.5s ease, border-color 0.5s ease; }

    /* ═══ ANEL DE PROGRESSO (injetado dinamicamente) ═══ */
    #orb-dual-ring-svg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10; transform: rotate(-90deg);
    }
    .orb-dual-ring-track { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 2.5; }
    .orb-dual-ring-fill {
      fill: none; stroke: #67e6ff; stroke-width: 2.5; stroke-linecap: round;
      stroke-dasharray: 150.8; stroke-dashoffset: 150.8; transition: stroke 0.3s ease;
    }

    /* ═══ OVERLAYS ═══ */
    #arch-overlay, #agua-overlay {
      position: fixed; inset: 0; z-index: var(--z-overlay);
      display: none; align-items: center; justify-content: center;
      background: rgba(2,2,10,0.75); backdrop-filter: blur(8px);
    }
    #arch-overlay.open, #agua-overlay.open { display: flex; }

    .arch-wheel {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
      max-width: 380px; background: linear-gradient(135deg, rgba(10,10,30,0.97), rgba(5,5,18,0.99));
      border: 1px solid var(--border); border-radius: 22px; padding: 18px;
      box-shadow: 0 0 60px var(--arch-glow), 0 30px 60px rgba(0,0,0,0.8);
      animation: fadeIn .28s cubic-bezier(.34,1.56,.64,1) both;
    }
    .arch-wheel-title { width: 100%; text-align: center; font-family: var(--mono);
      font-size: 0.6rem; color: var(--kob-voice-primary); letter-spacing: 0.4em;
      text-transform: uppercase; opacity: 0.6; margin-bottom: 6px; }

    .arch-chip { display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 8px 10px; border-radius: 12px; border: 1px solid transparent; cursor: pointer;
      transition: all 0.18s; font-family: var(--mono); min-width: 56px; }
    .arch-chip:hover { transform: scale(1.1); border-color: currentColor; background: rgba(255,255,255,0.04); }
    .a-orb { width: 26px; height: 26px; border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, var(--a-color), transparent 50%),
                  radial-gradient(circle at 70% 70%, var(--a-prim), var(--a-sec));
      box-shadow: 0 0 10px currentColor; }
    .a-name { font-size: 7px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.55); }
    .a-freq { font-size: 6px; color: rgba(255,255,255,0.3); letter-spacing: 1px; }

    /* ═══ PAINEL ÁGUA (3 CAMADAS) ═══ */
    .agua-panel {
      background: linear-gradient(160deg, rgba(12,10,28,0.99), rgba(6,5,16,0.99));
      border: 1px solid var(--border); border-radius: 22px; width: min(360px,92vw);
      overflow: hidden; box-shadow: 0 0 80px var(--arch-glow), 0 30px 60px rgba(0,0,0,0.85);
      animation: fadeIn .3s cubic-bezier(.34,1.56,.64,1) both;
    }

    .agua-head { padding: 18px 20px; background: linear-gradient(160deg, rgba(92,184,222,0.2), rgba(5,5,18,0.4));
      border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; position: relative; }
    .agua-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .agua-ttl { flex: 1; font-size: 14px; font-weight: 600; color: var(--mist); font-family: var(--mono); }
    .agua-hz { font-size: 11px; color: var(--text-secondary); letter-spacing: 1px; }
    .agua-close { width: 28px; height: 28px; border: 1px solid var(--border); background: transparent;
      border-radius: 8px; color: var(--kob-voice-primary); cursor: pointer; font-size: 14px;
      transition: all 0.2s; font-family: inherit; }
    .agua-close:hover { background: rgba(92,184,222,0.1); }

    .agua-body { padding: 16px 20px; font-family: var(--mono); }
    .agua-row { display: flex; align-items: center; gap: 8px; padding: 8px 0;
      border-bottom: 0.5px solid var(--border-subtle); font-size: 12px; }
    .agua-row:last-of-type { border-bottom: none; }
    .agua-lbl { color: rgba(255,255,255,0.32); font-size: 10px; width: 70px;
      flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.5px; }
    .agua-val { flex: 1; color: rgba(255,255,255,0.82); }
    .agua-tag { font-size: 9px; padding: 3px 8px; border-radius: 6px;
      background: rgba(122,185,72,0.2); color: #7ab948; border: 0.5px solid #7ab948; }

    .agua-map { display: flex; gap: 16px; justify-content: center; padding: 16px 20px;
      border-top: 0.5px solid rgba(255,255,255,0.07); }
    .agua-layer { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .agua-layer-dot { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--border-light);
      display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer;
      transition: all 0.2s; }
    .agua-layer-dot.active { border-color: #5cffde; background: rgba(92,184,222,0.1);
      box-shadow: 0 0 12px rgba(92,184,222,0.3); }
    .agua-layer-dot:hover { transform: scale(1.08); }
    .agua-layer-name { font-size: 9px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.5px; }

    .agua-btn { width: 100%; padding: 12px 20px; margin: 16px 0;
      background: linear-gradient(135deg, rgba(92,184,222,0.15), rgba(0,200,255,0.1));
      border: 1px solid rgba(92,184,222,0.3); border-radius: 10px; color: #5cffde;
      cursor: pointer; font-family: var(--mono); font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.5px; transition: all 0.25s; }
    .agua-btn:hover { background: linear-gradient(135deg, rgba(92,184,222,0.25), rgba(0,200,255,0.2));
      box-shadow: 0 0 20px rgba(92,184,222,0.3); }

    /* ═══ MISC ═══ */
    .chroma-ripple { position: fixed; inset: 0; z-index: calc(var(--z-hud)-1);
      pointer-events: none; border-radius: 0; opacity: 0; animation: none; }
    .chroma-ripple.fire { animation: chromaFire 0.75s cubic-bezier(0.2,0.8,0.2,1) forwards; }
    @keyframes chromaFire { 0%{opacity:0.22; transform:scale(0.2);} 40%{opacity:0.18; transform:scale(1.4);} 100%{opacity:0; transform:scale(2.2);} }

    #particles-js { position: fixed; inset: 0; z-index: 0; }
    .response-container { position: fixed; left: 20px; right: 20px; bottom: 160px;
      padding: 12px; background: rgba(0,0,0,0.3); backdrop-filter: blur(8px);
      border-radius: 20px; max-height: calc(100vh - 200px); overflow-y: auto; z-index: 1; }

    .response-block { margin: 1rem 0; padding: 1.3rem; border-radius: 12px; line-height: 1.8;
      background: linear-gradient(135deg, rgba(0,255,255,.2), rgba(0,100,100,.1));
      border-left: 4px solid #0ff; animation: fadeIn 1.8s ease forwards; }

    .toggle-wrap { display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <!-- ═══ SYMBOL BAR v2 ═══ -->
  <div class="symbol-bar floating" id="symbolBar">
    <div class="toggle-wrap">
      <button class="symbol-button main-toggle" id="sbToggleBtn" title="Menu">≡</button>
    </div>
    <button class="symbol-button" id="btn-arch" title="ORB DUAL: 1.5s=ÁGUA | 3s=ARQUÉTIPOS">
      <div class="tts-orb-mini"><div class="orb" id="main-orb"><div class="orb-core"></div></div></div>
    </button>
    <div class="hud-info" id="hudStatus">KOBLLUX</div>
  </div>

  <!-- ═══ OVERLAY ARQUÉTIPOS (3s) ═══ -->
  <div id="arch-overlay">
    <div class="arch-wheel" id="archWheel">
      <div class="arch-wheel-title">· SELECIONAR ARQUÉTIPO ·</div>
    </div>
  </div>

  <!-- ═══ OVERLAY ÁGUA · 3 CAMADAS (1.5s) ═══ -->
  <div id="agua-overlay">
    <div class="agua-panel">
      <div class="agua-head">
        <div class="agua-dot" id="agua-dot-current" style="background:#67e6ff"></div>
        <div class="agua-ttl" id="agua-ttl">☁ GASOSO · arquétipo ativo</div>
        <div class="agua-hz" id="agua-hz">432 Hz</div>
        <button class="agua-close" id="agua-close-btn" onclick="closeAguaPanel()">✕</button>
      </div>

      <div class="agua-body" id="agua-body-content">
        <!-- renderizado via JS -->
      </div>

      <div class="agua-map">
        <div class="agua-layer">
          <div class="agua-layer-dot" id="agua-l-gas" onclick="switchAguaLayer('gas')">☁</div>
          <div class="agua-layer-name">GAS</div>
        </div>
        <div class="agua-layer">
          <div class="agua-layer-dot active" id="agua-l-liq" onclick="switchAguaLayer('liq')" style="background:#5cffde;border-color:#5cffde">💧</div>
          <div class="agua-layer-name">LIQ</div>
        </div>
        <div class="agua-layer">
          <div class="agua-layer-dot" id="agua-l-sol" onclick="switchAguaLayer('sol')">🧊</div>
          <div class="agua-layer-name">SOL</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ CHROMA RIPPLE ═══ -->
  <div id="chroma-ripple" class="chroma-ripple"></div>

  <!-- ═══ CHAT (ESTRUTURA MINIMAL) ═══ -->
  <div class="response-container" id="responseContainer">
    <div class="response-block">Aguardando entrada...</div>
  </div>

  <script>
    // ════════════════════════════════════════════════════════════════════════
    // ORB DUAL ENGINE — 1.5s (ÁGUA) + 3s (ARQUÉTIPOS)
    // ════════════════════════════════════════════════════════════════════════

    const DURATION_AGUA = 1500;  // 1.5s
    const DURATION_ARCH = 3000;  // 3s
    const RING_R = 24;
    const RING_C = 2 * Math.PI * RING_R; // ≈ 150.8

    // ─────────────────────────────────────────────────────────────────────────
    // 1. ARQUÉTIPOS
    // ─────────────────────────────────────────────────────────────────────────
    const ARCHETYPES = [
      { name:'kobllux', p:'#C9A84C', s:'#8B4513', a:'#F0C060', f:432, e:'∞', r:'VERDADE · INTEGRAR' },
      { name:'atlas', p:'#8e9aaf', s:'#5c6478', a:'#b0bec5', f:432, e:'🗿', r:'FUNDAÇÃO · ESTRUTURA' },
      { name:'nova', p:'#00e5ff', s:'#0099cc', a:'#80f4ff', f:528, e:'⚡', r:'ENERGIA · VELOCIDADE' },
      { name:'vitalis', p:'#00e070', s:'#00a050', a:'#80ffb8', f:639, e:'🌿', r:'VIDA · CRESCIMENTO' },
      { name:'pulse', p:'#ff7020', s:'#cc3800', a:'#ffaa60', f:741, e:'🔥', r:'IMPULSO · AÇÃO' },
      { name:'kaos', p:'#ff2a6d', s:'#aa0040', a:'#ff80a0', f:852, e:'🌪', r:'CAOS · TRANSFORMAÇÃO' },
    ];

    let currentIdx = 0;
    let currentAguaLayer = 'liq'; // 'gas' | 'liq' | 'sol'

    // ─────────────────────────────────────────────────────────────────────────
    // 2. RENDERIZAR WHEEL DE ARQUÉTIPOS
    // ─────────────────────────────────────────────────────────────────────────
    function buildArchWheel() {
      const wheel = document.getElementById('archWheel');
      ARCHETYPES.forEach((arch, idx) => {
        const chip = document.createElement('div');
        chip.className = 'arch-chip';
        chip.style.setProperty('--a-color', arch.a);
        chip.style.setProperty('--a-prim', arch.p);
        chip.style.setProperty('--a-sec', arch.s);
        chip.innerHTML = `
          <div class="a-orb" style="background:radial-gradient(circle at 35% 30%, ${arch.a} 0%, transparent 50%), radial-gradient(circle at 70% 70%, ${arch.p} 0%, ${arch.s} 100%);"></div>
          <div class="a-name">${arch.name}</div>
          <div class="a-freq">${arch.f}Hz</div>
        `;
        chip.onclick = () => {
          applyArchetype(idx);
          closeArchOverlay();
          fireChroma();
        };
        wheel.appendChild(chip);
      });
    }

    function applyArchetype(idx) {
      currentIdx = idx % ARCHETYPES.length;
      const arch = ARCHETYPES[currentIdx];
      const root = document.documentElement;
      root.style.setProperty('--kob-voice-primary', arch.p);
      root.style.setProperty('--kob-voice-secondary', arch.s);
      root.style.setProperty('--kob-voice-accent', arch.a);
      root.style.setProperty('--arch-color', arch.p);
      root.style.setProperty('--arch-glow', `rgba(${hexToRgb(arch.p)}, 0.35)`);
      
      const hud = document.getElementById('hudStatus');
      if (hud) hud.textContent = arch.name.toUpperCase() + ' · ' + arch.f + 'Hz';
      
      const sBar = document.getElementById('symbolBar');
      sBar.classList.remove('chroma-transition');
      void sBar.offsetWidth;
      sBar.classList.add('chroma-transition');
      setTimeout(() => sBar.classList.remove('chroma-transition'), 450);
    }

    function openArchOverlay() {
      document.getElementById('arch-overlay').classList.add('open');
    }

    function closeArchOverlay() {
      document.getElementById('arch-overlay').classList.remove('open');
    }

    document.getElementById('arch-overlay')?.addEventListener('click', (e) => {
      if(e.target === document.getElementById('arch-overlay')) closeArchOverlay();
    });

    // ─────────────────────────────────────────────────────────────────────────
    // 3. RENDERIZAR E CONTROLAR PAINEL ÁGUA
    // ─────────────────────────────────────────────────────────────────────────
    const AGUA_LAYERS = {
      gas: { name: '☁ GASOSO · arquétipo', color: '#4a90d9', hz: '432 Hz',
        rows: [
          { lbl: 'ARQUÉTIPO', val: 'KOBLLUX', tag: 'VOCAL' },
          { lbl: 'VOZ', val: 'Nova · pt-BR' },
          { lbl: 'FREQ', val: '852 Hz · ativo' }
        ]
      },
      liq: { name: '💧 ESTOJO · subconsciente', color: '#5cffde', hz: '528 Hz',
        rows: [
          { lbl: 'USUÁRIO', val: 'Sistema' },
          { lbl: 'MODELO', val: 'Claude 3.5' },
          { lbl: 'INFODOSE', val: 'KOBLLUX v7.9' },
          { lbl: 'COFRE', val: '3 chaves', tag: 'CRIPT' }
        ]
      },
      sol: { name: '🧊 COFRE · camada basal', color: '#a8d8f0', hz: '639 Hz',
        rows: [
          { lbl: 'AES-256-GCM', val: 'ativa' },
          { lbl: 'CHAVES', val: '3 salvas' },
          { lbl: 'ESTADO', val: 'desbloqueado', tag: 'OK' }
        ]
      }
    };

    function renderAguaLayer(layer) {
      const data = AGUA_LAYERS[layer];
      if (!data) return;

      document.getElementById('agua-dot-current').style.background = data.color;
      document.getElementById('agua-ttl').textContent = data.name;
      document.getElementById('agua-hz').textContent = data.hz;

      const body = document.getElementById('agua-body-content');
      body.innerHTML = data.rows.map(r => `
        <div class="agua-row">
          <span class="agua-lbl">${r.lbl}</span>
          <span class="agua-val">${r.val}</span>
          ${r.tag ? `<span class="agua-tag">${r.tag}</span>` : ''}
        </div>
      `).join('');

      // Atualizar dots
      document.querySelectorAll('.agua-layer-dot').forEach((d, i) => {
        const layers = ['gas', 'liq', 'sol'];
        const isActive = layers[i] === layer;
        d.classList.toggle('active', isActive);
        if (isActive) {
          d.style.background = data.color;
          d.style.borderColor = data.color;
        } else {
          d.style.background = '';
          d.style.borderColor = 'var(--border-light)';
        }
      });

      currentAguaLayer = layer;
    }

    window.switchAguaLayer = function(layer) {
      renderAguaLayer(layer);
    };

    window.closeAguaPanel = function() {
      document.getElementById('agua-overlay').classList.remove('open');
    };

    function openAguaPanel() {
      document.getElementById('agua-overlay').classList.add('open');
      renderAguaLayer(currentAguaLayer);
    }

    document.getElementById('agua-overlay')?.addEventListener('click', (e) => {
      if(e.target === document.getElementById('agua-overlay')) closeAguaPanel();
    });

    // ─────────────────────────────────────────────────────────────────────────
    // 4. ORB DUAL PRESS DETECTION
    // ─────────────────────────────────────────────────────────────────────────
    function injectOrbRing() {
      const btn = document.getElementById('btn-arch');
      if (!btn || btn.dataset.orbDualRing) return;
      btn.style.position = 'relative';

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.id = 'orb-dual-ring-svg';
      svg.setAttribute('viewBox', '0 0 52 52');

      const track = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      track.setAttribute('class', 'orb-dual-ring-track');
      track.setAttribute('cx', '26');
      track.setAttribute('cy', '26');
      track.setAttribute('r', '22');

      const fill = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      fill.id = 'orb-dual-fill';
      fill.setAttribute('class', 'orb-dual-ring-fill');
      fill.setAttribute('cx', '26');
      fill.setAttribute('cy', '26');
      fill.setAttribute('r', '22');

      svg.appendChild(track);
      svg.appendChild(fill);
      btn.appendChild(svg);
      btn.dataset.orbDualRing = '1';
    }

    function setupOrbDualPress() {
      const btn = document.getElementById('btn-arch');
      const fill = document.getElementById('orb-dual-fill');
      if (!btn || btn._orbDualBound) return;
      btn._orbDualBound = true;

      let timer1, timer2, raf, t0 = null;
      let timerAguaFired = false;

      function ringSet(pct, color) {
        if (!fill) return;
        fill.style.transition = 'none';
        fill.style.strokeDashoffset = RING_C * (1 - pct / 100);
        if (color) fill.style.stroke = color;
      }

      function ringReset() {
        if (!fill) return;
        fill.style.transition = 'stroke-dashoffset .25s ease, stroke .3s ease';
        fill.style.strokeDashoffset = String(RING_C);
        fill.style.stroke = '#67e6ff';
      }

      function onDown() {
        btn._orbDualLong = false;
        timerAguaFired = false;
        t0 = Date.now();

        // Timer para 1.5s (ÁGUA)
        timer1 = setTimeout(() => {
          timerAguaFired = true;
          ringSet(50, '#5cffde');
          openAguaPanel();
        }, DURATION_AGUA);

        // Timer para 3s (ARQUÉTIPOS)
        timer2 = setTimeout(() => {
          btn._orbDualLong = true;
          cancelAnimationFrame(raf);
          ringSet(100, '#a8d8f0');
          if (timerAguaFired) closeAguaPanel();
          openArchOverlay();
        }, DURATION_ARCH);

        // Animação do anel
        (function tick() {
          if (t0 === null) return;
          const pct = Math.min((Date.now() - t0) / DURATION_ARCH * 100, 100);
          const color = pct < 50 ? '#67e6ff' : pct < 100 ? '#5cffde' : '#a8d8f0';
          ringSet(pct, color);
          if (pct < 100) raf = requestAnimationFrame(tick);
        })();
      }

      function onUp() {
        cancel();
      }

      function cancel() {
        clearTimeout(timer1);
        clearTimeout(timer2);
        cancelAnimationFrame(raf);
        t0 = null;
        ringReset();
      }

      btn.addEventListener('pointerdown', onDown, { passive: true });
      btn.addEventListener('pointerup', onUp);
      btn.addEventListener('pointerleave', cancel);
    }

    // ─────────────────────────────────────────────────────────────────────────
    // 5. UTILIDADES
    // ─────────────────────────────────────────────────────────────────────────
    function fireChroma() {
      const r = document.getElementById('chroma-ripple');
      const btn = document.getElementById('btn-arch');
      const rect = btn.getBoundingClientRect();
      const x = (rect.left + rect.width / 2) / window.innerWidth * 100;
      const y = (rect.top + rect.height / 2) / window.innerHeight * 100;
      
      r.style.setProperty('--ripple-x', x + '%');
      r.style.setProperty('--ripple-y', y + '%');
      r.style.background = `radial-gradient(circle at ${x}% ${y}%, var(--kob-voice-primary) 0%, rgba(139,69,19,0.5) 30%, transparent 70%)`;
      r.classList.remove('fire');
      void r.offsetWidth;
      r.classList.add('fire');
    }

    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : "201,168,76";
    }

    // ─────────────────────────────────────────────────────────────────────────
    // 6. INIT
    // ─────────────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      buildArchWheel();
      injectOrbRing();
      setupOrbDualPress();
      applyArchetype(0);

      // Particles.js
      if (window.particlesJS) {
        particlesJS('particles-js', {
          particles: {
            number: { value: 40 },
            color: { value: ['#0ff', '#f0f'] },
            shape: { type: 'circle' },
            opacity: { value: 0.4 },
            size: { value: 2.4 },
            move: { enable: true, speed: 1.5 }
          },
          retina_detect: true
        });
      }
    });
  </script>
