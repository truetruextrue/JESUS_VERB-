<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Elysha</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root{ --acc:#39ffb6; --acc2:#a77cff; --ok:#e8e2ff; --speed:6.5s; }
  html,body{height:100%}
  body{margin:0;background:#0a0b13;color:#ecf0ff;font:16px/1.4 system-ui;overflow:hidden}
  .stage{position:fixed;inset:0;display:grid;place-items:center;contain:paint}
  .core{width:260px;height:260px;border-radius:50%;position:relative;
        background:radial-gradient(circle at 30% 30%, var(--ok), var(--acc) 60%, transparent 62%),
                   conic-gradient(var(--acc), var(--acc2), var(--ok), var(--acc));
        filter:drop-shadow(0 0 24px var(--acc)) drop-shadow(0 0 42px var(--acc2));
        animation:spin var(--speed) linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .label{position:fixed; inset:auto 0 22px; text-align:center; opacity:.95; font-weight:800}
  #arch-log{position:fixed;left:10px;bottom:10px;font:12px/1 ui-monospace;color:rgba(255,255,255,0.8);background:#0006;padding:6px;border-radius:8px;max-width:70vw;overflow:auto;max-height:32vh}
</style>
</head>
<body>
  <div class="stage fx-fade"><div class="core"></div></div>
  <div class="label">Ritual • Elysha</div>
  <div id="arch-log" style="display:none"></div>
<script>
(function(){
  const ARCH = 'elysha';
  const logEl = document.getElementById('arch-log');
  function log(){ if(logEl){ logEl.style.display='block'; logEl.textContent = Array.from(arguments).join(' '); } console.log('[arch:'+ARCH+']', ...arguments); }

  window.__hubVoices = window.__hubVoices || {};

  function postReady(){ parent.postMessage({ type:'arch:ready', arch: ARCH }, '*'); log('ready'); }
  function onVoicesUpdate(m){ window.__hubVoices = m.voices || {}; log('voices update', JSON.stringify(window.__hubVoices)); }
  function speak(text){
    if(!text) return;
    try{
      const map = window.__hubVoices || {};
      const voiceName = map[ARCH] || '';
      const ut = new SpeechSynthesisUtterance(text);
      const voices = speechSynthesis.getVoices() || [];
      if(voiceName){
        const found = voices.find(v => v.name === voiceName || v.name.toLowerCase().includes(voiceName.toLowerCase()));
        if(found) ut.voice = found;
      }
      speechSynthesis.cancel(); speechSynthesis.speak(ut);
      parent.postMessage({ type:'arch:played', arch: ARCH, text }, '*');
    }catch(e){ log('speak err', e) }
  }

  window.addEventListener('message', ev => {
    const m = ev.data; if(!m || typeof m !== 'object') return;
    if(m.type === 'voices:update') onVoicesUpdate(m);
    if(m.type === 'arch:speak' && m.arch === ARCH) speak(m.text);
  });

  window.addEventListener('DOMContentLoaded', () => setTimeout(postReady, 120));
})();
</script>
</body>
</html>
