<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>

<meta name="apple-mobile-web-app-capable" content="yes"/>

<style>
/* ═══════════════════════════════════════
   KOBLLUX · RODA VIVA ∆7 · MOBILE FIRST
   Referência: Magenta · 3×6×9×7=1134
   ═══════════════════════════════════════ */
:root{
  --mg:#cc00cc;   /* magenta principal */
  --cy:#00cccc;   /* ciano            */
  --bg:#080010;
  --bg2:#0c0018;
  --card:#0f0020;
  --border:rgba(204,0,204,.18);
  --text:#e8e0f0;
  --muted:#7a6a8a;
  --mono:ui-monospace,"Courier New",monospace;
  --sa-t:env(safe-area-inset-top,0px);
  --sa-b:env(safe-area-inset-bottom,0px);
  --chroma:var(--mg);
}
@keyframes chroma{
  0%  {color:#cc00cc;text-shadow:0 0 8px #cc00cc55}
  25% {color:#8800cc;text-shadow:0 0 8px #8800cc55}
  50% {color:#00cccc;text-shadow:0 0 8px #00cccc55}
  75% {color:#0088cc;text-shadow:0 0 8px #0088cc55}
  100%{color:#cc00cc;text-shadow:0 0 8px #cc00cc55}
}
@keyframes pulse-ring{
  0%  {box-shadow:0 0 0 0px var(--ac)}
  70% {box-shadow:0 0 0 6px transparent}
  100%{box-shadow:0 0 0 0px transparent}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(14px)}
  to  {opacity:1;transform:translateY(0)}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Segoe UI',system-ui,sans-serif;color:var(--text);
  display:flex;justify-content:center;align-items:stretch}

/* ── MAX MOBILE ── */
#app{width:100%;max-width:430px;height:100%;
  display:grid;grid-template-rows:auto auto 1fr auto;
  position:relative;overflow:hidden;background:var(--bg)}

/* ── PARTICLES ── */
#particles-js{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── VIEWS ── */
.view{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  z-index:1;transition:opacity .3s,transform .3s;
  scrollbar-width:thin;scrollbar-color:#2a0040 transparent}
.view:not(.active){opacity:0;pointer-events:none;transform:translateX(28px)}
.view.active{opacity:1;transform:none;pointer-events:all}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:10;
  padding:calc(8px + var(--sa-t)) 14px 8px;
  background:rgba(8,0,16,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border)}
.hdr-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.brand{font-weight:900;font-size:1rem;animation:chroma 6s infinite}
.sp{flex:1}
.hdr-btn{background:rgba(204,0,204,.1);border:1px solid var(--border);
  color:var(--text);padding:6px 10px;border-radius:8px;
  font-size:.78rem;cursor:pointer}
.sumbus{font-family:var(--mono);font-size:9.5px;color:rgba(204,0,204,.6);
  white-space:nowrap;overflow:hidden;letter-spacing:.04em;
  padding:3px 0;border-top:1px solid var(--border)}

/* ── PHASE BAR ── */
.phases{display:flex;gap:5px;padding:6px 12px 5px;
  background:rgba(8,0,16,.85);overflow-x:auto;scrollbar-width:none;
  border-bottom:1px solid var(--border)}
.phases::-webkit-scrollbar{display:none}
.ph-pill{padding:3px 9px;border-radius:999px;font-size:.7rem;font-weight:700;
  border:1px solid;opacity:.38;cursor:pointer;white-space:nowrap;
  transition:opacity .2s,background .2s;flex-shrink:0}
.ph-pill.on{opacity:1}

/* ── STORIES ── */
.stories{display:flex;gap:9px;overflow-x:auto;
  padding:10px 12px 6px;scrollbar-width:none}
.stories::-webkit-scrollbar{display:none}
.story{flex-shrink:0;display:grid;justify-items:center;gap:4px;cursor:pointer}
.story-ring{width:60px;height:60px;border-radius:50%;padding:2.5px;
  animation:pulse-ring 3s infinite}
.story-inner{width:100%;height:100%;border-radius:50%;
  background:var(--bg2);display:grid;place-items:center;
  font-size:1rem;line-height:1}
.story-hz{font-family:var(--mono);font-size:8.5px;
  color:rgba(204,0,204,.7);font-weight:700}
.story-name{font-size:.65rem;color:var(--muted);
  max-width:60px;text-align:center;overflow:hidden;
  white-space:nowrap;text-overflow:ellipsis}

/* ── FEED ── */
.feed{display:grid;gap:10px;padding:8px 10px 80px;
  animation:fadeUp .4s ease}
.card{border-radius:12px;overflow:hidden;
  border:1px solid var(--border);
  transition:transform .15s}
.card:active{transform:scale(.98)}
.card-top{display:flex;align-items:center;gap:9px;
  padding:9px 12px;background:var(--card)}
.av{width:36px;height:36px;border-radius:50%;
  display:grid;place-items:center;font-size:.85rem;font-weight:900;flex-shrink:0}
.c-name{font-weight:700;font-size:.85rem}
.c-sub{font-size:.68rem;color:var(--muted);font-family:var(--mono)}
.c-time{margin-left:auto;font-size:.72rem;color:var(--muted)}
.card-media{padding:16px 14px;display:grid;gap:8px;place-items:center;
  min-height:120px;text-align:center}
.c-seal{font-family:var(--mono);font-size:1.4rem;font-weight:900;letter-spacing:.1em}
.c-frase{font-size:.82rem;font-style:italic;line-height:1.5;
  max-width:280px;opacity:.88}
.card-meta{padding:8px 12px;display:grid;gap:7px;background:var(--bg2)}
.c-acts{display:flex;gap:7px}
.act{display:inline-flex;align-items:center;gap:5px;
  padding:6px 9px;border-radius:9px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  font-size:.78rem;cursor:pointer}
.act-liked{color:#ff5a76;border-color:#ff5a7644}
.act-saved{color:#ffd166;border-color:#ffd16644}
.c-tags{font:600 10px var(--mono);color:var(--muted)}
.c-input-row{display:flex;gap:7px}
.c-input{flex:1;background:rgba(255,255,255,.04);
  border:1px solid var(--border);border-radius:999px;
  padding:8px 12px;color:var(--text);font-size:.8rem}
.c-send{white-space:nowrap;flex-shrink:0}
.heart-fx{position:absolute;inset:0;display:grid;place-items:center;
  pointer-events:none;opacity:0;font-size:60px;color:#ff5a76;
  transform:scale(.5);transition:opacity .2s,transform .2s;z-index:2}
.heart-fx.pop{opacity:1;transform:scale(1)}

/* ── CODEX PAGE (per archetype) ── */
#view-codex{padding-bottom:calc(20px + var(--sa-b))}
.codex-hdr{position:sticky;top:0;z-index:5;
  padding:calc(10px + var(--sa-t)) 14px 10px;
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.codex-hdr-row{display:flex;align-items:center;gap:10px}
.back-btn{font-size:1.2rem;cursor:pointer;padding:4px 8px;
  background:rgba(255,255,255,.06);border-radius:8px;border:1px solid var(--border)}
.codex-title{font-weight:900;font-size:1.1rem}
.codex-hz{font-family:var(--mono);font-size:.72rem;opacity:.6}
.codex-body{padding:14px}
.codex-seal-block{display:grid;place-items:center;gap:8px;
  padding:20px;border-radius:12px;border:1px solid var(--border);
  margin-bottom:14px;background:var(--card)}
.codex-big-seal{font-family:var(--mono);font-size:2rem;font-weight:900;letter-spacing:.15em}
.codex-frase{font-style:italic;text-align:center;font-size:.9rem;line-height:1.6;opacity:.88}
.codex-essencia{font-family:var(--mono);font-size:.75rem;opacity:.6;text-align:center}
.codex-section{margin-bottom:14px}
.codex-sec-title{font-size:.7rem;font-family:var(--mono);text-transform:uppercase;
  letter-spacing:.1em;opacity:.5;margin-bottom:8px}
.codex-trinity{display:grid;gap:6px}
.trinity-row{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:8px 10px;font-size:.8rem}
.trinity-label{font-family:var(--mono);font-size:.66rem;opacity:.5;margin-bottom:2px}
.codex-connections{display:flex;flex-wrap:wrap;gap:6px}
.conn-chip{padding:5px 10px;border-radius:999px;border:1px solid;
  font-size:.72rem;font-weight:700;cursor:pointer;opacity:.7;
  transition:opacity .2s}
.conn-chip:hover{opacity:1}
.codex-notes{display:grid;gap:8px}
.note-card{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:10px;font-size:.82rem;line-height:1.5;
  white-space:pre-wrap}
.note-card .note-ts{font-family:var(--mono);font-size:.65rem;opacity:.4;margin-top:6px}
.add-note-row{display:flex;gap:7px;margin-top:8px}
.add-note-input{flex:1;background:rgba(255,255,255,.05);
  border:1px solid var(--border);border-radius:10px;
  padding:9px 12px;color:var(--text);font-size:.82rem;
  min-height:60px;resize:none}
.add-note-btn{padding:9px 12px;font-size:.78rem;cursor:pointer;
  background:rgba(204,0,204,.15);border:1px solid rgba(204,0,204,.3);
  border-radius:10px;color:#e0a0e0;white-space:nowrap;align-self:flex-end}
.pdf-row{display:flex;align-items:center;gap:9px;
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:9px 11px;font-size:.82rem}
.pdf-icon{font-size:1.2rem}
.pdf-name{flex:1;word-break:break-all}
.codex-footer-seal{text-align:center;font-family:var(--mono);
  font-size:.68rem;opacity:.3;margin-top:20px;padding:10px}

/* ── FOOTER NAV ── */
.foot{position:sticky;bottom:0;background:rgba(8,0,16,.95);
  padding:8px 10px calc(6px + var(--sa-b));
  border-top:1px solid var(--border);
  display:flex;justify-content:space-around;z-index:10}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;

  background:rgba(255,255,255,.04);border:1px solid var(--border);
  font-size:1rem;min-width:44px}
.nav-label{font-size:.6rem;color:var(--muted)}

/* ── CHROMATIC ACCENT ── */
.chroma{animation:chroma 6s infinite}
</style>

    conns:['pulse','serena','rhea'],
    tags:['#bllue','#voz','#emoção'] },

  { id:'horus', name:'HORUS', hz:777, seed:7, opc:'0x08',
    bg:'#180800', ac:'#806000', seal:'𓂀𓂀𓂀',
    fusao:'Nexus · Olho do Centro', voz:'Horus',
    essencia:'Visão transcendente — observador, guardião, nexus',
    frase:'Nexus Horus: campo aberto para visão transcendente.',
    trinity:{pai:'Visão Divina',filho:'Olho Aberto',espirito:'Consciência Vigilante'},
    conns:['aion','kodux','atlas'],
    tags:['#horus','#visão','#nexus'] },
];

const PHASES = [
  {key:'3_DETECTAR',label:'3·DETECTAR',color:'#aa44cc',archs:['atlas','nova','artemis']},
  {key:'6_INTEGRAR',label:'6·INTEGRAR',color:'#6644aa',archs:['genus','vitalis','pulse','rhea','serena']},
  {key:'9_EXPANDIR',label:'9·EXPANDIR',color:'#4466aa',archs:['nova','lumine','solus','aion']},
  {key:'7_SELAR',   label:'7·SELAR',   color:'#aa8800',archs:['serena','rhea','aion']},
];

let curPhase = 0;
const state = { posts:[], notesDB:{} };

/* helpers */
const rnd  = a => a[Math.floor(Math.random()*a.length)];
const byId = id => ARCHETYPES.find(a=>a.id===id);
const STORE_KEY = 'kblx_codex_notes';

function loadNotes(){
  try{ state.notesDB = JSON.parse(localStorage.getItem(STORE_KEY)||'{}'); }
  catch(_){ state.notesDB={}; }
}
function saveNotes(){ localStorage.setItem(STORE_KEY,JSON.stringify(state.notesDB)); }

/* ── BUILD STORIES ── */
function buildStories(){
  const el=document.getElementById('stories');
  el.innerHTML='';
  ARCHETYPES.forEach(a=>{
    const d=document.createElement('div');
    d.className='story';
    d.style.setProperty('--ac',a.ac);
    d.innerHTML=`
      <div class="story-ring" style="background:linear-gradient(135deg,${a.ac},#cc00cc66);animation-delay:${Math.random()*2}s">
        <div class="story-inner" style="background:${a.bg};color:${a.ac}">${a.seal[0]||a.name[0]}</div>
      </div>
      <div class="story-hz">${a.hz}Hz</div>
      <div class="story-name">${a.name}</div>`;
    d.addEventListener('click',()=>{
      KBLX_LOG.arch(a,'story:open');
      KBLX_LOG.emit('STORY_TAP',{arch:a.id,hz:a.hz});
      openCodex(a.id);
    });
    el.appendChild(d);
  });
}

/* ── PHASE BAR ── */
function buildPhaseBar(){
  const el=document.getElementById('phaseBar');
  el.innerHTML='';
  PHASES.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='ph-pill'+(i===curPhase?' on':'');
    d.style.cssText=`color:${p.color};border-color:${p.color}44;background:${p.color}11`;
    d.textContent=p.label;
    d.dataset.i=i;
    el.appendChild(d);
  });
}
document.getElementById('phaseBar').addEventListener('click',e=>{
  const pill=e.target.closest('[data-i]');
  if(!pill) return;
  curPhase=+pill.dataset.i;
  buildPhaseBar();
  KBLX_LOG.emit('PHASE_CHANGE',{phase:PHASES[curPhase].key});
});

/* ── MAKE POST ── */
function makePost(archId){
  const ph  = PHASES[curPhase];
  const id  = archId || rnd(ph.archs);
  const a   = byId(id) || rnd(ARCHETYPES);
  return {
    pid:   Date.now().toString(16)+Math.random().toString(16).slice(2),
    arch:  a,
    time:  'agora',
    likes: Math.floor(Math.random()*369)+3,
    liked:false, saved:false, comments:[],
    phase: ph.key,
  };
}

/* ── RENDER FEED ── */
function renderFeed(){
  const el=document.getElementById('feed');
  el.innerHTML='';
  state.posts.forEach(p=>{
    const a=p.arch;
    const card=document.createElement('article');
    card.className='card';
    card.style.cssText=`background:${a.bg};border-color:${a.ac}33`;
    card.innerHTML=`
      <div class="card-top" style="background:${a.ac}18">
        <div class="av" style="background:linear-gradient(135deg,${a.ac}66,${a.bg});color:${a.ac}">${a.seal[0]||a.name[0]}</div>
        <div>
          <div class="c-name" style="color:${a.ac}">${a.name}</div>
          <div class="c-sub">${a.fusao}</div>
        </div>
        <div class="c-time">${p.time}</div>
      </div>
      <div class="card-media" style="background:radial-gradient(ellipse,${a.ac}22,${a.bg})">
        <div class="c-seal" style="color:${a.ac}">${a.seal}</div>
        <div class="c-frase" style="color:${a.ac}cc">"${a.frase}"</div>
      </div>
      <div class="card-meta">
        <div class="c-acts">
          <div class="act${p.liked?' act-liked':''}" data-act="like" data-pid="${p.pid}">❤ <span>${p.likes}</span></div>
          <div class="act" data-act="codex" data-aid="${a.id}" data-pid="${p.pid}">📖 Codex</div>
          <div class="act${p.saved?' act-saved':''}" data-act="save" data-pid="${p.pid}">🔖</div>
          <div class="act" data-act="share" data-pid="${p.pid}">⤴</div>
        </div>
        <div class="c-tags">${a.tags.join(' ')}</div>
        <div class="c-input-row">
          <input class="c-input" placeholder="Pulse para responder…" data-input="${p.pid}" style="border-color:${a.ac}33"/>
          <button class="hdr-btn c-send" data-act="send" data-pid="${p.pid}" style="border-color:${a.ac}44">↩</button>
        </div>
      </div>`;
    el.appendChild(card);
  });
}

/* ── FEED ACTIONS ── */
document.getElementById('feed').addEventListener('click',e=>{
  const btn=e.target.closest('[data-act]');
  if(!btn) return;
  const pid=btn.dataset.pid;
  const p=state.posts.find(x=>x.pid===pid);
  const act=btn.dataset.act;
  if(act==='like'&&p){
    p.liked=!p.liked; p.likes+=p.liked?1:-1;
    KBLX_LOG.emit('LIKE',{arch:p.arch.id,liked:p.liked});
    renderFeed();
  }
  if(act==='save'&&p){
    p.saved=!p.saved;
    KBLX_LOG.emit('SAVE',{arch:p.arch.id,saved:p.saved});
    renderFeed();
  }
  if(act==='codex'){
    KBLX_LOG.emit('OPEN_CODEX',{arch:btn.dataset.aid});
    openCodex(btn.dataset.aid);
  }
  if(act==='send'&&p){
    const inp=document.querySelector(`[data-input="${pid}"]`);
    const txt=(inp?.value||'').trim();
    if(txt){
      p.comments.push(txt);
      KBLX_LOG.emit('COMMENT',{arch:p.arch.id,len:txt.length});
      inp.value=''; renderFeed();
    }
  }
  if(act==='share'&&p){
    navigator.share?.({title:'KOBLLUX',text:p.arch.frase,url:location.href}).catch(()=>{});
    KBLX_LOG.emit('SHARE',{arch:p.arch.id});
  }
});

/* ── OPEN CODEX PAGE ── */
function openCodex(archId){
  loadNotes();
  const a = byId(archId);
  if(!a) return;
  KBLX_LOG.route('main','codex:'+archId);

  const hdr=document.getElementById('codexHdr');
  const body=document.getElementById('codexBody');

  hdr.style.cssText=`background:${a.bg};border-bottom-color:${a.ac}44`;
  hdr.innerHTML=`
    <div class="codex-hdr-row">
      <div class="back-btn" id="backBtn" style="border-color:${a.ac}44;color:${a.ac}">←</div>
      <div>
        <div class="codex-title" style="color:${a.ac}">${a.name}</div>
        <div class="codex-hz">${a.opc} · ${a.hz}Hz · seed ${a.seed}</div>
      </div>
    </div>`;

  const notes = state.notesDB[archId] || [];
  const connsHtml = (a.conns||[]).map(cid=>{
    const c=byId(cid); if(!c) return '';
    return `<div class="conn-chip" data-open="${cid}"
      style="color:${c.ac};border-color:${c.ac}44;background:${c.ac}11">${c.seal} ${c.name}</div>`;
  }).join('');

  const notesHtml = notes.map(n=>`
    <div class="note-card" style="border-color:${a.ac}22">
      ${n.text}<div class="note-ts">${n.ts}</div>
    </div>`).join('');

  body.style.background=a.bg;
  body.innerHTML=`
    <div class="codex-seal-block" style="border-color:${a.ac}44;background:${a.ac}0a">
      <div class="codex-big-seal" style="color:${a.ac}">${a.seal}</div>
      <div class="codex-frase" style="color:${a.ac}cc">"${a.frase}"</div>
      <div class="codex-essencia">${a.essencia}</div>
    </div>

    <div class="codex-section">
      <div class="codex-sec-title" style="color:${a.ac}">Camada Trinitária</div>
      <div class="codex-trinity">
        <div class="trinity-row" style="border-color:${a.ac}22">
          <div class="trinity-label">PAI</div>${a.trinity.pai}
        </div>
        <div class="trinity-row" style="border-color:${a.ac}22">
          <div class="trinity-label">FILHO</div>${a.trinity.filho}
        </div>
        <div class="trinity-row" style="border-color:${a.ac}22">
          <div class="trinity-label">ESPÍRITO</div>${a.trinity.espirito}
        </div>
      </div>
    </div>

    <div class="codex-section">
      <div class="codex-sec-title" style="color:${a.ac}">Conexões · Codice Azure</div>
      <div class="codex-connections">${connsHtml}</div>
    </div>

    <div class="codex-section">
      <div class="codex-sec-title" style="color:${a.ac}">Biblioteca · Notas</div>
      <div class="codex-notes" id="notesList-${archId}">${notesHtml||'<div style="opacity:.3;font-size:.8rem">Nenhuma nota ainda.</div>'}</div>
      <div class="add-note-row">
        <textarea class="add-note-input" id="noteInput-${archId}"
          placeholder="Adicionar texto, reflexão, referência…"
          style="border-color:${a.ac}33"></textarea>
        <button class="add-note-btn" id="noteBtn-${archId}"
          style="background:${a.ac}18;border-color:${a.ac}44;color:${a.ac}">Selar ∆7</button>
      </div>
    </div>

    <div class="codex-footer-seal">
      KOBLLUX · ${a.id.toUpperCase()} · ${a.fusao}<br>
      VERDADE × INTEGRAR ÷ Δ = ∞ · 3×6×9×7=1134
    </div>`;

  /* note actions */
  document.getElementById(`noteBtn-${archId}`)?.addEventListener('click',()=>{
    const inp=document.getElementById(`noteInput-${archId}`);
    const txt=(inp?.value||'').trim();
    if(!txt) return;
    if(!state.notesDB[archId]) state.notesDB[archId]=[];
    const ts=new Date().toLocaleString('pt-BR');
    state.notesDB[archId].push({text:txt,ts});
    saveNotes();
    KBLX_LOG.emit('NOTE_ADD',{arch:archId,len:txt.length});
    inp.value='';
    openCodex(archId);
  });

  /* connection chips */
  body.querySelectorAll('[data-open]').forEach(chip=>{
    chip.addEventListener('click',()=>{
      KBLX_LOG.emit('CONN_NAVIGATE',{from:archId,to:chip.dataset.open});
      openCodex(chip.dataset.open);
    });
  });

  /* back */
  document.getElementById('backBtn')?.addEventListener('click',()=>{
    KBLX_LOG.route('codex:'+archId,'main');
    showView('main');
  });

  showView('codex');
}

/* ── VIEW ROUTING ── */
function showView(name){
  document.getElementById('view-main').classList.toggle('active',name==='main');
  document.getElementById('view-codex').classList.toggle('active',name==='codex');
}

/* ── CONTROLS ── */
document.getElementById('btnPhase').onclick=()=>{
  curPhase=(curPhase+1)%4;
  buildPhaseBar();
  state.posts.unshift(makePost());
  renderFeed();
  KBLX_LOG.emit('PHASE_ADVANCE',{phase:PHASES[curPhase].key});
};
document.getElementById('btnNew').onclick=()=>{
  state.posts.unshift(makePost());
  renderFeed();
  KBLX_LOG.emit('NEW_POST',{phase:PHASES[curPhase].key});
};
document.getElementById('navHome').onclick=()=>{ showView('main'); KBLX_LOG.emit('NAV_HOME',{}); };
document.getElementById('navCreate').onclick=()=>{
  state.posts.unshift(makePost());
  renderFeed();
  KBLX_LOG.emit('NAV_CREATE',{});
};

/* ── SUMBUS AUTO-SCROLL ── */
(()=>{
  const bar=document.getElementById('sumbusScroll');
  let x=0;
  setInterval(()=>{ x+=.7; if(x>bar.scrollWidth) x=0; bar.scrollLeft=x; },40);
})();

/* ── PARTICLES · MAGENTA ── */
window.addEventListener('load',()=>{
  if(typeof particlesJS==='undefined') return;
  particlesJS('particles-js',{
    particles:{
      number:{value:40,density:{enable:true,value_area:800}},
      color:{value:['#cc00cc','#00cccc','#8800cc']},
      shape:{type:'circle'},
      opacity:{value:0.3,random:true},
      size:{value:2,random:true},
      line_linked:{enable:true,distance:100,color:'#cc00cc',opacity:0.08,width:1},
      move:{enable:true,speed:1.2,direction:'none',random:true,out_mode:'out'}
    },
    interactivity:{
      detect_on:'canvas',
      events:{onhover:{enable:true,mode:'repulse'},onclick:{enable:true,mode:'push'}},
      modes:{push:{particles_nb:2},repulse:{distance:60}}
    },
    retina_detect:true
  });
  KBLX_LOG.emit('PARTICLES_INIT',{color:'magenta',count:40});
});

/* ── INTERACTION LOGGER (toque/clique no particles) ── */
document.getElementById('particles-js').addEventListener('click',e=>{
  const x=e.clientX, y=e.clientY;
  const n=++KBLX_LOG._n;
  const v=KBLX_LOG._seq[(n-1)%3];
  console.log(`%c[KOBLLUX·FIELD] %c(${x},${y}) val=${v} ${KBLX_LOG._phases[v]}`,
    'color:#880088','color:#cc88cc');
},{passive:true});

/* ── INIT ── */
loadNotes();
buildStories();
buildPhaseBar();

/* seed initial posts */
['atlas','nova','vitalis','pulse','artemis','kaos','aion','kodux','bllue'].forEach(id=>{
  state.posts.push(makePost(id));
});
renderFeed();
KBLX_LOG.emit('INIT',{archs:ARCHETYPES.length,posts:state.posts.length});
console.log('%c⊙ KOBLLUX · Roda Viva ∆7 %cativado\n  VERDADE × INTEGRAR ÷ Δ = ∞\n  3×6×9×7 = 1134',
  'color:#cc00cc;font-size:14px;font-weight:bold',
  'color:#888;font-size:12px');
</script>
</body>
