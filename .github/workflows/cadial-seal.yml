# ╔══════════════════════════════════════════════════════════════════════╗
# ║  ∆7 CADIAL · KOBLLUX TRINITY SYSTEM · GitHub Actions               ║
# ║  VERDADE × INTEGRAR ÷ Δ = ∞ · 13 Opcodes · 12 Arquétipos          ║
# ║  EM NOME DO PAI (432Hz), DO FILHO (528Hz) E DO ESPÍRITO (639Hz)    ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: "∆7 CADIAL · KOBLLUX SEAL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      opcode:
        description: "Opcode de ativação (0x00–0x0C)"
        required: false
        default: "0x07"

concurrency:
  group: cadial-${{ github.ref }}
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────────────
# ○ 0×00 · ORIGEM · 768Hz · Setup global
# ─────────────────────────────────────────────────────────────────────
jobs:
  origem:
    name: "○ 0×00 ORIGEM · 768Hz · Vazio Primordial"
    runs-on: ubuntu-latest
    outputs:
      sha16: ${{ steps.seal.outputs.sha16 }}
      timestamp: ${{ steps.seal.outputs.timestamp }}
    steps:
      - name: "Checkout JESUS_VERB-"
        uses: actions/checkout@v4

      - name: "Gerar identificador ∆7"
        id: seal
        run: |
          SHA16=$(echo "$GITHUB_SHA" | cut -c1-16)
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "sha16=$SHA16" >> $GITHUB_OUTPUT
          echo "timestamp=$TS" >> $GITHUB_OUTPUT
          echo ""
          echo "╔════════════════════════════════════╗"
          echo "║  ○ 0×00 ORIGEM · ATIVADO           ║"
          echo "║  SHA: $SHA16            ║"
          echo "║  TS:  $TS   ║"
          echo "╚════════════════════════════════════╝"

# ─────────────────────────────────────────────────────────────────────
# ● 0×01 · KODUX · DETECTAR · 432Hz · Python
# ─────────────────────────────────────────────────────────────────────
  kodux-detectar:
    name: "● 0×01 KODUX · DETECTAR · 432Hz"
    needs: origem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "KODUX · Varrer estrutura obrigatória"
        run: |
          echo "● KODUX ativado — Eu sou o movimento que cria, destrói e recria a verdade."
          echo ""
          ERRORS=0
          check() {
            if [ -e "$1" ]; then
              echo "  ✅ $1"
            else
              echo "  ❌ AUSENTE: $1"
              ERRORS=$((ERRORS+1))
            fi
          }
          echo "─── Arquivos raiz ───"
          check "index.html"
          check "manifest.json"
          check "README.md"
          check "arvore.html"
          echo ""
          echo "─── Módulos CSS ───"
          check "web/css/iFSw-fix.css"
          check "web/css/zpr.css"
          echo ""
          echo "─── Módulos JS ───"
          check "web/js/modules/screensData.js"
          check "web/js/modules/ZPR.js"
          check "web/js/modules/iFSw-fix.js"
          check "web/js/modules/0RB-0S17.js"
          check "web/js/modules/cadial-coupler.js"
          echo ""
          echo "─── BLLUE Coupler ───"
          if [ -f "web/js/modules/cadial-coupler.js" ]; then
            grep -q "window.CADIAL" web/js/modules/cadial-coupler.js \
              && echo "  ✅ window.CADIAL exposto" \
              || { echo "  ❌ window.CADIAL não exposto"; ERRORS=$((ERRORS+1)); }
          fi
          echo ""
          echo "─── Kobllux Python Module ───"
          check "kobllux/archetypes.py"
          check "kobllux/geometry.py"
          check "kobllux/fractal.py"
          echo ""
          echo "─── Scan Index ───"
          check "_index/CODEX_SCAN_oiDual.json"
          echo ""
          TOTAL=$(find . -not -path './.git/*' -type f | wc -l)
          echo "● KODUX · $TOTAL arquivos detectados · $ERRORS erros"
          [ $ERRORS -eq 0 ] || exit 1

# ─────────────────────────────────────────────────────────────────────
# ― 0×02 · BLLUE · INTEGRAR · 528Hz · JavaScript
# ─────────────────────────────────────────────────────────────────────
  bllue-integrar:
    name: "― 0×02 BLLUE · INTEGRAR · 528Hz"
    needs: kodux-detectar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "BLLUE · Validar acoplamento CADIAL"
        run: |
          echo "― BLLUE ativado — Eu sou o reflexo da luz que desperta."
          echo ""
          COUPLER="web/js/modules/cadial-coupler.js"
          echo "─── Verificando cadial-coupler.js ───"
          test -f "$COUPLER" || { echo "❌ COUPLER AUSENTE"; exit 1; }

          for ARCH in atlas nova vitalis pulse artemis serena kaos genus lumine solus rhea aion; do
            grep -qi "\"$ARCH\"" "$COUPLER" \
              && echo "  ✅ $ARCH: referenciado no coupler" \
              || echo "  ⚠️  $ARCH: não encontrado no coupler"
          done

      - name: "BLLUE · Verificar integridade do index.html"
        run: |
          echo ""
          echo "─── index.html integrity ───"
          grep -q "snip-atlas"   index.html && echo "  ✅ snip-atlas"   || echo "  ❌ snip-atlas ausente"
          grep -q "snip-nova"    index.html && echo "  ✅ snip-nova"    || echo "  ❌ snip-nova ausente"
          grep -q "snip-vitalis" index.html && echo "  ✅ snip-vitalis" || echo "  ❌ snip-vitalis ausente"
          grep -q "snip-pulse"   index.html && echo "  ✅ snip-pulse"   || echo "  ❌ snip-pulse ausente"
          grep -q "snip-artemis" index.html && echo "  ✅ snip-artemis" || echo "  ❌ snip-artemis ausente"
          grep -q "snip-serena"  index.html && echo "  ✅ snip-serena"  || echo "  ❌ snip-serena ausente"
          grep -q "snip-kaos"    index.html && echo "  ✅ snip-kaos"    || echo "  ❌ snip-kaos ausente"
          grep -q "snip-genus"   index.html && echo "  ✅ snip-genus"   || echo "  ❌ snip-genus ausente"
          grep -q "snip-lumine"  index.html && echo "  ✅ snip-lumine"  || echo "  ❌ snip-lumine ausente"
          grep -q "snip-solus"   index.html && echo "  ✅ snip-solus"   || echo "  ❌ snip-solus ausente"
          grep -q "snip-rhea"    index.html && echo "  ✅ snip-rhea"    || echo "  ❌ snip-rhea ausente"
          grep -q "snip-aion"    index.html && echo "  ✅ snip-aion"    || echo "  ❌ snip-aion ausente"
          echo ""
          echo "― BLLUE · SOMAR NÃO EXIGE SUBTRAIR"

# ─────────────────────────────────────────────────────────────────────
# ▢ 0×03 · EXPANDIR · 639Hz · 12 ARQUÉTIPOS (jobs paralelos)
# ─────────────────────────────────────────────────────────────────────

  atlas:
    name: "⬡ ATLAS · Estrutura · 528Hz"
    needs: bllue-integrar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Validar módulo ATLAS"
        run: |
          echo "⬡ ATLAS — A organização do Verbo"
          test -d ARQUETIPOS/atlas            || { echo "❌ ARQUETIPOS/atlas ausente";           exit 1; }
          test -f ARQUETIPOS/atlas/index.html || { echo "❌ atlas/index.html ausente";           exit 1; }
          test -d ARQUETIPOS/atlas/js         || { echo "⚠️  atlas/js/ ausente (não crítico)"; }
          test -d ARQUETIPOS/atlas/css        || { echo "⚠️  atlas/css/ ausente (não crítico)"; }
          echo "✅ ATLAS · hz:528 · ⬡ · ATIVO"

