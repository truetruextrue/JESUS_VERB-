          test -d ARQUETIPOS/kaos/js         || { echo "⚠️  kaos/js/ ausente (não crítico)"; }
          test -d ARQUETIPOS/kaos/css        || { echo "⚠️  kaos/css/ ausente (não crítico)"; }
          echo "✅ KAOS · hz:777 · ⚡ · ATIVO"

  genus:
    name: "⬢ GENUS · Gênese · 852Hz"
    needs: bllue-integrar
