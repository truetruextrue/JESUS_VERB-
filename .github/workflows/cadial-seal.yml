          test -f ARQUETIPOS/lumine/index.html || { echo "❌ lumine/index.html ausente";          exit 1; }
          test -d ARQUETIPOS/lumine/js         || { echo "⚠️  lumine/js/ ausente (não crítico)"; }
          test -d ARQUETIPOS/lumine/css        || { echo "⚠️  lumine/css/ ausente (não crítico)"; }
          echo "✅ LUMINE · hz:963 · ☀ · ATIVO"

