          test -d ARQUETIPOS/vitalis/js         || { echo "⚠️  vitalis/js/ ausente (não crítico)"; }
          test -d ARQUETIPOS/vitalis/css        || { echo "⚠️  vitalis/css/ ausente (não crítico)"; }
