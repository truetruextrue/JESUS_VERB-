<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <!-- PWA & VIEWPORT -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#05070a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="./web/CORE/icon-192.png">
  <link rel="manifest" href="./manifest.json">

  <title>KOBLLUX · JESUS_VERB- · ∆7</title>

  <!-- ── MÓDULOS CSS (locais) ────────────────────────────────────────── -->
  <!-- iFSw Shell: topbar, windows, dock, maximize, collapse, peek -->
  <link rel="stylesheet" href="./web/css/iFSw-fix.css">
  <!-- ZPR: grid 3×3, nav-matrix, presets, session loader -->
  <link rel="stylesheet" href="./web/css/zpr.css">

  <!-- ── TOKENS KOBLLUX z-layers (preservados intactos) ──────────────── -->
  <style>
    :root {
      --z-base:    0;
      --z-content: 100;
      --z-widget:  500;
      --z-overlay: 1000;
      --z-system:  5000;

      /* CADIAL color tokens — referenciados pelo coupler e pelo ORB  */
      --kob-voice-primary:  #C9A84C;
      --kob-voice-secondary:#8B4513;
      --kob-voice-accent:   #F0C060;
    }
  </style>
</head>

<!-- data-arch / data-zpr usados pelo ENGINE do ZPR.js e pelo FusionOS ORB -->
<body class="ui-safe-vertical"
      data-theme="dark"
      data-arch="KOBLLUX"
      data-user="Convidado"
      data-zpr="9"
      data-intensity="0.72">

  <!-- ══ OS SHELL (kxtsk-shell) ══════════════════════════════════════ -->
  <div id="kxtsk-shell">

    <!-- Top bar -->
    <div class="os-topbar">
      <div class="os-brand">
        KxTsK
        <small>JESUS_VERB- · ∆7</small>
      </div>

      <!-- Ações nativas do shell + botões CADIAL extras injetados pelo coupler -->
      <div class="top-actions">
        <button class="launcher-btn" id="openKobBtn">+ Abrir KOB</button>
        <button class="soft-btn"     id="openLogsBtn">Logs</button>
        <!-- #cadial-extra-btns inserido aqui pelo cadial-coupler.js -->
      </div>
    </div>

    <!-- Dock (gerenciado pelo iFSw-fix.js) -->
    <div id="dock"></div>

    <!-- Stack de janelas (iframes gerenciados pelo iFSw-fix.js) -->
    <div id="stackWrap">

      <!-- Janela inicial: DUAL H0 // KOB LV BASE -->
      <div class="session-window" id="session-iframe">
        <div class="win-hdr" onclick="handleHeaderClick(event, 'session-iframe')">
          <div class="win-title">🌐 DUAL H0 // KOB LV BASE</div>
          <div class="win-controls" onclick="event.stopPropagation()">
            <button onclick="toggleCollapse('session-iframe')"  title="Colapsar">—</button>
            <button onclick="toggleMaximize('session-iframe')"  title="Maximizar">⬜</button>
            <button onclick="minimizeWindow('session-iframe')"  title="Minimizar para o Dock">🔘</button>
            <button onclick="closeWindow('session-iframe')"     title="Fechar">✕</button>
          </div>
        </div>
        <iframe class="win-frame"
          src="https://kodux78k.github.io/oiDual-H0/DH0-10.html"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
          allow="fullscreen; accelerometer; autoplay; clipboard-write; encrypted-media; picture-in-picture"
          loading="lazy">
        </iframe>
      </div>

    </div><!-- /stackWrap -->
  </div><!-- /kxtsk-shell -->

  <!-- Theme switch (lido pelo 0x00-core.js / iFSw) -->
  <div class="theme-switch" id="themeSwitch" title="Alternar tema"></div>

  <!-- ══ ZPR MATRIX 3×3 ══════════════════════════════════════════════
       #ZPR      → grid de células (ZPR.js)
       #navMatrix → botões de navegação (ZPR.js)
       O cadial-coupler.js remapeia os data-url para os snips CADIAL. -->
  <div class="grid" style="z-index:0;mix-blend-mode:soft-light" id="ZPR"></div>
  <div class="nav-matrix" id="navMatrix"></div>

  <!-- ══ SNIPS DOS 12 ARQUÉTIPOS CADIAL ══════════════════════════════
       Templates ocultos; o cadial-coupler.js os instancia como
       session-windows via createSessionWindow() do iFSw-fix.js.     -->
  <div id="arch-snips" hidden aria-hidden="true">
    <!-- UNO -->
    <template id="snip-atlas">
      <iframe src="./ARQUETIPOS/atlas/index.html"   title="ATLAS"   loading="lazy"></iframe>
    </template>
    <template id="snip-nova">
      <iframe src="./ARQUETIPOS/nova/index.html"    title="NOVA"    loading="lazy"></iframe>
    </template>
    <template id="snip-artemis">
      <iframe src="./ARQUETIPOS/artemis/index.html" title="ARTEMIS" loading="lazy"></iframe>
    </template>
    <template id="snip-kaos">
      <iframe src="./ARQUETIPOS/kaos/index.html"    title="KAOS"    loading="lazy"></iframe>
    </template>
    <template id="snip-solus">
      <iframe src="./ARQUETIPOS/solus/index.html"   title="SOLUS"   loading="lazy"></iframe>
    </template>
    <!-- DUO -->
    <template id="snip-vitalis">
      <iframe src="./ARQUETIPOS/vitalis/index.html" title="VITALIS" loading="lazy"></iframe>
    </template>
    <template id="snip-pulse">
      <iframe src="./ARQUETIPOS/pulse/index.html"   title="PULSE"   loading="lazy"></iframe>
    </template>
    <template id="snip-lumine">
      <iframe src="./ARQUETIPOS/lumine/index.html"  title="LUMINE"  loading="lazy"></iframe>
    </template>
    <!-- TRINITY -->
    <template id="snip-serena">
      <iframe src="./ARQUETIPOS/serena/index.html"  title="SERENA"  loading="lazy"></iframe>
    </template>
    <template id="snip-genus">
      <iframe src="./ARQUETIPOS/genus/index.html"   title="GENUS"   loading="lazy"></iframe>
    </template>
    <template id="snip-rhea">
      <iframe src="./ARQUETIPOS/rhea/index.html"    title="RHEA"    loading="lazy"></iframe>
    </template>
    <template id="snip-aion">
      <iframe src="./ARQUETIPOS/aion/index.html"    title="AION"    loading="lazy"></iframe>
    </template>
  </div>

  <!-- ══ SCRIPTS · ordem de carga: dados → matrix → shell → ORB → CADIAL ══ -->

  <!-- 1. screensData.js → ícones e dados dos botões (DI BUTTON ICON LOADER) -->
  <script src="./web/js/modules/screensData.js"></script>

  <!-- 2. ZPR.js → matriz 3×3 + ENGINE de arquétipos + navigateTo() -->
  <script src="./web/js/modules/ZPR.js"></script>

  <!-- 3. iFSw-fix.js → gerenciador de janelas: handleHeaderClick,
          toggleCollapse, toggleMaximize, minimizeWindow, closeWindow,
          createSessionWindow, syncShellMode, updateMaximizedStacks    -->
  <script src="./web/js/modules/iFSw-fix.js"></script>

  <!-- 4. 0RB-0S17.js → FusionOS ORB widget (app launcher / sandbox) -->
  <script src="./web/js/modules/0RB-0S17.js"></script>

  <!-- 5. cadial-coupler.js → acopla 12 arquétipos ao ZPR + shell,
          injeta painel lateral ∆7, sincroniza ENGINE sem alterar opcodes -->
  <script src="./web/js/modules/cadial-coupler.js"></script>

</body>
</html>
