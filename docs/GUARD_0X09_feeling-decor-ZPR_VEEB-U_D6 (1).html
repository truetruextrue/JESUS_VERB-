  <style>
    /* ─── RESET TOTAL + LOCK iPHONE ─── */
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    :root {
      --brand-gold: #c5a059;
      --brand-dark: #05070a;
      --glass: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.15);
      --star-glow: rgba(197,160,89,0.25);
    }

    html {
      height: 100%;
      overflow: hidden;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--brand-dark);
      color: #fff;
      overflow: hidden;
      height: 100%;
      width: 100%;
      position: fixed;
      top: 0; left: 0;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: auto;
      touch-action: none;
    }

    .font-serif  { font-family: 'Cormorant Garamond', serif; }
    .font-tech   { font-family: 'Space Mono', monospace; }

    /* ─── UNIVERSO 3×3 ─── */
    #universe-grid {
      position: fixed;
      top: 0; left: 0;
      width: 300%;
      height: 300%;
      display: grid;
      grid-template-columns: repeat(3, 33.3333%);
      grid-template-rows: repeat(3, 33.3333%);
      transition: transform 0.5s cubic-bezier(0.25, 0.85, 0.35, 1);
      will-change: transform;
    }

    /* ─── CADA CÉLULA = 1 VIEWPORT ─── */
    .screen {
      width: 100vw;
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      background: #fff;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
    }

    .screen::-webkit-scrollbar { width: 3px; }
    .screen::-webkit-scrollbar-track { background: transparent; }
    .screen::-webkit-scrollbar-thumb { background: var(--brand-gold); border-radius: 4px; }

    .screen > .inner {
      min-height: 100%;
      padding-bottom: 100px;
    }

    /* ─── TIPOGRAFIA ─── */
    .hero-title {
      font-size: clamp(2.4rem, 8vw, 7rem);
      line-height: 0.9;
      letter-spacing: -0.04em;
    }
    .sub-title {
      font-size: clamp(1.8rem, 5vw, 4.5rem);
      line-height: 1.05;
    }

    /* ─── GLASS CARD ─── */
    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
    }

    /* ─── MANDALA ─── */
    .mandala {
      position: absolute;
      width: clamp(200px, 35vw, 500px);
      opacity: 0.06;
      animation: rotate 80s linear infinite;
      pointer-events: none;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }

    /* ─── DOTS NAVIGATION 3×3 ─── */
    .nav-matrix {
      position: fixed;
      bottom: calc(16px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 10px 18px;
      border-radius: 60px;
      z-index: 1000;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .matrix-dot {
      width: 9px; height: 9px;
      background: rgba(255,255,255,0.35);
      border-radius: 50%;
      transition: all 0.25s;
      cursor: pointer;
    }
    .matrix-dot.active {
      background: var(--brand-gold);
      transform: scale(1.6);
      box-shadow: 0 0 10px var(--brand-gold);
    }
    .matrix-dot:hover { background: rgba(255,255,255,0.7); }

    /* ─── GRID DE IMAGENS / VÍDEOS ─── */
    .media-grid { display: grid; gap: 16px; }
    @media (min-width: 768px) {
      .media-grid-3 { grid-template-columns: repeat(3, 1fr); }
      .media-grid-2 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 767px) {
      .media-grid-3 { grid-template-columns: 1fr; }
      .media-grid-2 { grid-template-columns: 1fr; }
    }

    /* ─── FEED CARDS ─── */
    .feed-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.25s;
    }
    .feed-card:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }

    /* ─── VIDEO / PLAYER ─── */
    .video-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 24px;
      overflow: hidden;
    }

    video { cursor: pointer; }

    /* ─── PLAYER FLUTUANTE ─── */
    #global-player {
      position: fixed;
      bottom: 24px; right: 20px;
      z-index: 3000;
      background: rgba(5,7,10,0.96);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: all 0.35s cubic-bezier(0.25,0.85,0.35,1);
      width: 380px;
      max-width: calc(100vw - 32px);
      box-shadow: 0 24px 48px rgba(0,0,0,0.5);
    }
    #global-player.player-hidden { transform: translateY(140%); opacity: 0; pointer-events: none; }

    /* ─── CURSOR PERSONALIZADO (desktop) ─── */
    @media (pointer: fine) {
      body { cursor: none; }
      #custom-cursor {
        width: 12px; height: 12px;
        background: var(--brand-gold);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition: transform 0.15s, width 0.2s, height 0.2s, opacity 0.2s;
        mix-blend-mode: difference;
      }
      #cursor-ring {
        width: 36px; height: 36px;
        border: 1px solid rgba(197,160,89,0.5);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 9998;
        transform: translate(-50%, -50%);
        transition: all 0.25s ease;
      }
      a, [onclick], .matrix-dot, .feed-card { cursor: none; }
    }

    /* ─── DESKTOP: LAYOUT EXPANDIDO ─── */
    @media (min-width: 1024px) {
      .screen > .inner { padding-bottom: 80px; }
      .hero-title { font-size: clamp(4rem, 7vw, 9rem); }
      .sub-title  { font-size: clamp(2.5rem, 4.5vw, 5.5rem); }
      .max-w-content { max-width: 1280px; margin: 0 auto; }
    }

    /* ─── TELAS ─── */
    .screen-dark  { background: var(--brand-dark); }
    .screen-black { background: #000; }
    .screen-white { background: #fff; }

    /* ─── MOBILE ─── */
    @media (max-width: 700px) {
      .nav-matrix { gap: 8px; padding: 8px 14px; }
      .matrix-dot { width: 8px; height: 8px; }
    }

    /* ─── KEYBOARD HINT (desktop) ─── */
    .kbd-hint {
      position: fixed;
      top: 20px; right: 20px;
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3);
      z-index: 999;
      pointer-events: none;
      display: none;
    }
    @media (pointer: fine) { .kbd-hint { display: block; } }

    /* ─── BRAND COLOR UTIL ─── */
    .text-brand-gold   { color: var(--brand-gold); }
    .bg-brand-gold     { background: var(--brand-gold); }
    .border-brand-gold { border-color: var(--brand-gold); }

      height: 1px;

        rgba(197,160,89,0.15) 20%,
        rgba(197,160,89,0.6) 50%,
        rgba(197,160,89,0.15) 80%,

      margin-bottom: 18px;
      position: relative;

      content: '✦';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--brand-gold);
      font-size: 10px;
      background: transparent;
      line-height: 1;

      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(197,160,89,0.4);

      animation: pulsar-estrela 3s ease-in-out infinite;
      display: block;
      margin: 0 auto 10px;

    @keyframes pulsar-estrela {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 6px var(--brand-gold)); }
    }
  </style>

              <div class="max-w-content w-full">
                <div class="text-center mb-8">
                  <h2 class="sub-title font-serif italic">Catálogo <strong class="text-brand-gold">Vivo</strong></h2>
                  <p class="text-white/40 text-xs font-tech mt-2 tracking-widest">Sincronizado via GitHub · 672Hz</p>
                </div>
                <div id="feedContainer" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
                <p id="mensagemFeed" class="text-center text-white/30 mt-8 font-tech text-sm hidden">Nenhuma mídia encontrada.</p>
              </div>
            </div>
          `
        }
      ],

      [ // ── LINHA 2 ──────────────────────────────────────────────────

        { // (2,0) Bastidores
          bg: 'screen-black',
          content: `
            <div class="flex flex-col items-center justify-start pt-24 p-6 md:p-12 min-h-screen bg-black text-white">
              <div class="max-w-content w-full">
                <h2 class="sub-title font-serif italic mb-10">
                  Bastidores da <strong class="not-italic text-brand-gold">Perfeição.</strong>
                </h2>
                <div class="grid md:grid-cols-2 gap-6">
                  <div class="video-wrap">
                    <video src="https://kodux78k.github.io/oiDual-Vivivi-1/media/portifolio/piso0.mp4"
                      class="w-full h-full object-cover" autoplay muted loop playsinline></video>
                  </div>
                  <div class="video-wrap">
                    <iframe class="w-full h-full"
                      src="https://www.youtube.com/embed/koKhjQKGJSc"
                      frameborder="0" allowfullscreen loading="lazy"></iframe>
                  </div>
                </div>
              </div>
            </div>
          `
        },

        { // (2,1) Projetos / Galeria
          bg: 'screen-white',
          content: `
            <div class="flex flex-col items-center justify-start pt-24 p-6 md:p-12 min-h-screen bg-white">
              <div class="max-w-content w-full">
                <h2 class="hero-title font-serif font-black text-[#05070a] mb-4">
                  Imagens que<br><em>respiram<br>presença</em>
                </h2>
                <div class="media-grid media-grid-2 mt-8">
                  <div class="rounded-3xl overflow-hidden shadow-lg">
                    <img src="https://kodux78k.github.io/oiDual-Vivivi-1/media/conceito/img2.jpg"
                      class="w-full h-auto object-cover" loading="lazy">
                  </div>
                  <div class="rounded-3xl overflow-hidden shadow-lg">
                    <img src="https://kodux78k.github.io/oiDual-Vivivi-1/media/conceito/img1.jpg"
                      class="w-full h-auto object-cover" loading="lazy">
                  </div>
                </div>
                <p class="text-gray-400 text-center mt-10 max-w-2xl mx-auto text-lg leading-relaxed">
                  O objetivo não é impressionar pelo excesso. É criar uma experiência silenciosa, onde tudo parece estar no lugar certo.
                </p>
              </div>
            </div>
          `
        },

        { // (2,2) Contato
          bg: 'screen-dark',
          content: `
            <div class="flex flex-col items-center justify-center text-center p-8 md:p-16 min-h-screen" style="background:#0b0c10;">
              <div class="max-w-content w-full">
                <p class="font-tech text-xs uppercase tracking-[0.5em] text-brand-gold mb-4">São Paulo · SP · Brasil</p>
                <h2 class="hero-title font-serif font-black italic mb-8">Fale<br>conosco.</h2>
                <a href="https://wa.me/" class="font-serif italic text-brand-gold text-xl underline underline-offset-4">WhatsApp Oficial →</a>
                <div class="mt-12 video-wrap max-w-md mx-auto">
                  <video src="https://kodux78k.github.io/oiDual-Vivivi-1/media/portifolio/piso1.mp4"
                    class="w-full h-full object-cover" autoplay muted loop playsinline></video>
                </div>
              </div>
            </div>
          `
        }
      ]
    ];

    // ═══════════════════════════════════════════════════
    //  ESTADO DE NAVEGAÇÃO
    // ═══════════════════════════════════════════════════
    let currentRow = 1, currentCol = 1;
    const ROWS = 3, COLS = 3;
    let isAnimating = false;

    // ── CONSTRUÇÃO DO GRID ──
    const grid = document.getElementById('universe-grid');
    function buildGrid() {
      grid.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const wrap = document.createElement('div');
          wrap.className = `screen ${screensData[r]?.[c]?.bg || 'screen-dark'}`;
          wrap.dataset.row = r;
          wrap.dataset.col = c;
          const data = screensData[r]?.[c];
          wrap.innerHTML = data
            ? `<div class="inner w-full">${data.content}</div>`
            : `<div class="inner flex items-center justify-center h-full"><p class="font-tech text-xs text-white/30">∴</p></div>`;
          grid.appendChild(wrap);
        }
      }
    }
    buildGrid();

    function setupVideoTapToggle(root = document) {
      root.querySelectorAll('video').forEach(video => {
        if (video.dataset.tapToggleBound === '1') return;
        video.dataset.tapToggleBound = '1';
        video.autoplay = true;
        video.loop = true;
        video.playsInline = true;
        video.muted = true;
        video.defaultMuted = true;
        video.preload = 'metadata';
        video.setAttribute('webkit-playsinline', '');
        const startMuted = () => {
          video.muted = true;
          const p = video.play();
          if (p && typeof p.catch === 'function') p.catch(() => {});
        };
        if (video.readyState >= 1) startMuted();
        else video.addEventListener('loadedmetadata', startMuted, { once: true });
        video.addEventListener('click', (e) => {
          e.preventDefault(); e.stopPropagation();
          if (video.muted) { video.muted = false; video.volume = 1; video.play().catch(()=>{}); }
          else { video.muted = true; }
        });
      });
    }
    setupVideoTapToggle();

    // ── UPDATE TRANSFORM + DOTS ──
    function updateView() {
      const tx = -currentCol * (100 / 3);
      const ty = -currentRow * (100 / 3);
      grid.style.transform = `translate(${tx}%, ${ty}%)`;
      document.querySelectorAll('.matrix-dot').forEach((dot, i) => {
        dot.classList.toggle('active', Math.floor(i/3) === currentRow && i%3 === currentCol);
      });
    }

    // ── NAVEGAÇÃO PÚBLICA ──
    window.navigateTo = function(row, col) {
      if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return;
      if (row === currentRow && col === currentCol) return;
      if (isAnimating) return;
      isAnimating = true;
      currentRow = row; currentCol = col;
      updateView();
      setTimeout(() => { isAnimating = false; }, 520);
    };

    // ── DOTS ──
    const navMatrix = document.getElementById('navMatrix');
    for (let i = 0; i < 9; i++) {
      const dot = document.createElement('div');
      dot.className = 'matrix-dot';
      const r = Math.floor(i/3), c = i%3;
      dot.addEventListener('click', () => navigateTo(r, c));
      navMatrix.appendChild(dot);
    }

    // ═══════════════════════════════════════════════════
    //  GESTOS — TOUCH + MOUSE DRAG
    // ═══════════════════════════════════════════════════
    const SWIPE_DIST = 45, SWIPE_TIME = 350;
    let drag = { x: 0, y: 0, t: 0, active: false };

    document.addEventListener('touchstart', e => {
      drag.x = e.touches[0].clientX; drag.y = e.touches[0].clientY;
      drag.t = Date.now(); drag.active = true;
    }, { passive: true });

    document.addEventListener('touchend', e => {
      if (!drag.active) return;
      const dx = e.changedTouches[0].clientX - drag.x;
      const dy = e.changedTouches[0].clientY - drag.y;
      drag.active = false;
      if (Date.now() - drag.t > SWIPE_TIME) return;
      handleSwipe(dx, dy);
    }, { passive: true });

    document.addEventListener('mousedown', e => {
      drag.x = e.clientX; drag.y = e.clientY;
      drag.t = Date.now(); drag.active = true;
    });
    document.addEventListener('mouseup', e => {
      if (!drag.active) return;
      const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
      const dt = Date.now() - drag.t; drag.active = false;
      if (dt > SWIPE_TIME || (Math.abs(dx) < SWIPE_DIST && Math.abs(dy) < SWIPE_DIST)) return;
      handleSwipe(dx, dy);
    });

    function handleSwipe(dx, dy) {
      const ax = Math.abs(dx), ay = Math.abs(dy);
      if (ax > ay && ax > SWIPE_DIST) {
        dx < 0 ? navigateTo(currentRow, currentCol+1) : navigateTo(currentRow, currentCol-1);
      } else if (ay > ax && ay > SWIPE_DIST) {
        dy < 0 ? navigateTo(currentRow+1, currentCol) : navigateTo(currentRow-1, currentCol);
      }
    }

    document.addEventListener('keydown', e => {
      switch(e.key) {
        case 'ArrowRight': navigateTo(currentRow, currentCol+1); break;
        case 'ArrowLeft':  navigateTo(currentRow, currentCol-1); break;
        case 'ArrowDown':  navigateTo(currentRow+1, currentCol); break;
        case 'ArrowUp':    navigateTo(currentRow-1, currentCol); break;
        case 'Home':       navigateTo(1, 1); break;
      }
    });

    let wheelCooldown = false;
    document.addEventListener('wheel', e => {
      if (wheelCooldown) return;
      wheelCooldown = true;
      setTimeout(() => { wheelCooldown = false; }, 700);
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        e.deltaY > 0 ? navigateTo(currentRow+1, currentCol) : navigateTo(currentRow-1, currentCol);
      } else {
        e.deltaX > 0 ? navigateTo(currentRow, currentCol+1) : navigateTo(currentRow, currentCol-1);
      }
    }, { passive: true });

    // ═══════════════════════════════════════════════════
    //  CURSOR PERSONALIZADO
    // ═══════════════════════════════════════════════════
    const cur  = document.getElementById('custom-cursor');
    const ring = document.getElementById('cursor-ring');
    let cx = 0, cy = 0, rx = 0, ry = 0;

    if (window.matchMedia('(pointer: fine)').matches) {
      document.addEventListener('mousemove', e => {
        cx = e.clientX; cy = e.clientY;
        cur.style.left = cx + 'px'; cur.style.top = cy + 'px';
      });
      (function animRing() {
        rx += (cx - rx) * 0.12; ry += (cy - ry) * 0.12;
        ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
        requestAnimationFrame(animRing);
      })();
    }

    // ═══════════════════════════════════════════════════
    //  PLAYER UNIVERSAL
    // ═══════════════════════════════════════════════════
    const playerDiv   = document.getElementById('global-player');
    const playerFrame = document.getElementById('playerFrame');

    function detectType(src) {
      if (/\.(mp3|ogg|wav|m4a)/i.test(src)) return 'audio';
      if (/\.(mp4|webm|mov)/i.test(src)) return 'video';
      const ytM = src.match(/(?:embed\/|v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
      if (ytM) return { type: 'yt', id: ytM[1] };
      if (/\.(jpg|jpeg|png|gif|webp)/i.test(src)) return 'image';
      return null;
    }

    window.Player = {
      play(src, title='') {
        const t = detectType(src);
        if (!t) return;
        let html = '';
        if (t.type === 'yt') {
          html = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${t.id}?autoplay=1&mute=1&playsinline=1" frameborder="0" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
        } else if (t === 'video') {
          html = `<video src="${src}" class="w-full h-full object-cover" autoplay muted loop playsinline></video>`;
        } else if (t === 'audio') {
          html = `<div class="p-4 flex flex-col items-center gap-3"><p class="font-serif text-lg text-white">${title}</p><audio src="${src}" class="w-full" controls autoplay></audio></div>`;
        } else if (t === 'image') {
          html = `<img src="${src}" class="w-full h-full object-contain">`;
        }
        playerFrame.innerHTML = html;
        playerDiv.classList.remove('player-hidden');
        setupVideoTapToggle(playerFrame);
      },
      close() {
        playerDiv.classList.add('player-hidden');
        playerFrame.innerHTML = '';
      }
    };

    document.getElementById('closePlayer').addEventListener('click', () => Player.close());

    // ═══════════════════════════════════════════════════
    //  CATÁLOGO GITHUB JSON (auto-load, sem botão)
    // ═══════════════════════════════════════════════════
    const FEED_URL = 'https://raw.githubusercontent.com/Kodux78k/oiDual-Vivivi-1/main/feeling-feed.json';

    async function carregarCatalogo() {
      const cont = document.getElementById('feedContainer');
      const msg  = document.getElementById('mensagemFeed');
      if (!cont) return;
      cont.innerHTML = '<div class="col-span-2 text-center text-white/40 font-tech text-sm py-8">✨ Sincronizando…</div>';
      try {
        const res = await fetch(FEED_URL);
        if (!res.ok) throw new Error();
        renderCatalogo(await res.json());
      } catch {
        cont.innerHTML = '<div class="col-span-2 text-center text-red-400 font-tech text-sm py-8">⚠️ Verifique o JSON no repositório.</div>';
      }
    }

    function renderCatalogo(data) {
      const cont = document.getElementById('feedContainer');
      let html = '', total = 0;
      (data.categories || []).forEach(cat => {
        (cat.vids || []).forEach(vid => {
          total++;
          const ytM = vid.match(/(?:embed\/|v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
          const thumb = ytM ? `https://img.youtube.com/vi/${ytM[1]}/mqdefault.jpg` : null;
          const isImg = /\.(jpg|jpeg|png|gif|webp)/i.test(vid);
          const isVid = /\.(mp4|webm|mov)/i.test(vid);
          const esc = vid.replace(/'/g, "\\'");
          html += `<div class="feed-card p-4" onclick="Player.play('${esc}','${cat.cat.replace(/'/g,"\\'")}')">
            <div class="video-wrap bg-black/40">
              ${thumb ? `<img src="${thumb}" class="w-full h-full object-cover">`
                : isImg ? `<img src="${esc}" class="w-full h-full object-cover">`
                : isVid ? `<div class="w-full h-full flex items-center justify-center text-4xl">🎬</div>`
                : `<div class="w-full h-full flex items-center justify-center text-4xl">▶</div>`}
            </div>
            <div class="mt-3">
              <h3 class="font-serif text-lg font-bold text-brand-gold">${cat.cat}</h3>
              <p class="font-tech text-xs text-white/40 mt-1 truncate">${vid.length>60?vid.slice(0,60)+'…':vid}</p>
            </div>
          </div>`;
        });
      });
      (data.podcasts || []).forEach(catPod => {
        (catPod.eps || []).forEach(ep => {
          total++;
          const esc = ep.url.replace(/'/g, "\\'");
          html += `<div class="feed-card p-4" onclick="Player.play('${esc}','${ep.title.replace(/'/g,"\\'")}')">
            <div class="flex gap-4 items-center">
              <div class="w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 bg-black/40 flex items-center justify-center text-2xl">
                ${ep.cover ? `<img src="${ep.cover}" class="w-full h-full object-cover">` : '🎧'}
              </div>
              <div>
                <h3 class="font-serif text-lg font-bold text-brand-gold">${ep.title}</h3>
                <p class="font-tech text-xs text-white/40">${catPod.cat}</p>
              </div>
            </div>
          </div>`;
        });
      });
      cont.innerHTML = total ? html : '';
      if (msg) msg.classList.toggle('hidden', total > 0);
    }

    // ── EVITAR ZOOM DUPLO-TOQUE iOS ──
    let lastTap = 0;
    document.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTap < 300) e.preventDefault();
      lastTap = now;
    }, { passive: false });

    // ── INIT ──
    setTimeout(() => carregarCatalogo(), 600);
    updateView();

    // ── KOBLLUX ZPR · LOG ──────────────────────────────────
    console.log('%c KOBLLUX · ZPR COMPLETO ', 'background:#c5a059;color:#000;font-weight:bold;padding:4px 8px;');
    console.log('%c SERENA [0x09] · KAOS [0x06] · MANU SPACE ∴ ', 'color:#c5a059;font-style:italic;');
    console.log('%c VERDADE × INTEGRAR ÷ Δ = ♾️ · 3×6×9×7=1134 ', 'color:rgba(197,160,89,0.5);font-size:10px;');
  </script>
